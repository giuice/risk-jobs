<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Death Clock</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="AI Job Death Clock">
  <meta property="og:description" content="Find out when the machines come for your job. Bilingual cyberpunk countdown, roast, and shareable AI doom.">
  <meta property="og:url" content="https://giuice.github.io/risk-jobs/">
  <meta property="og:image" content="https://giuice.github.io/risk-jobs/og-preview.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="AI Job Death Clock">
  <meta name="twitter:description" content="Find out when the machines come for your job. Bilingual cyberpunk countdown, roast, and shareable AI doom.">
  <meta name="twitter:image" content="https://giuice.github.io/risk-jobs/og-preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-hover: #1f2b47;
      --bg-card-selected: #0d2137;
      --neon-green: #00ff41;
      --neon-cyan: #00d4ff;
      --neon-pink: #ff2e97;
      --neon-yellow: #ffd700;
      --text-primary: #e0e0e0;
      --text-secondary: #8892b0;
      --text-dim: #4a5568;
      --font-mono: 'Share Tech Mono', 'Courier New', 'Consolas', monospace;
      --glow-green: 0 0 10px rgba(0,255,65,0.4), 0 0 20px rgba(0,255,65,0.2);
      --glow-pink: 0 0 10px rgba(255,46,151,0.4), 0 0 20px rgba(255,46,151,0.2);
      --glow-cyan: 0 0 10px rgba(0,212,255,0.4), 0 0 20px rgba(0,212,255,0.2);
      --transition-fast: 0.15s ease;
      --transition-normal: 0.3s ease;
      --border-radius: 4px;
      --neon-glow-green:
        0 0 4px #fff,
        0 0 8px rgba(0,255,65,0.8),
        0 0 16px var(--neon-green),
        0 0 32px var(--neon-green),
        0 0 60px rgba(0,255,65,0.4);
      --neon-glow-pink:
        0 0 4px #fff,
        0 0 8px rgba(255,46,151,0.8),
        0 0 16px var(--neon-pink),
        0 0 32px var(--neon-pink);
      --neon-glow-cyan:
        0 0 4px #fff,
        0 0 8px rgba(0,212,255,0.8),
        0 0 16px var(--neon-cyan),
        0 0 28px var(--neon-cyan);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    body[data-booting='true'] #input-view,
    body[data-booting='true'] #results-view {
      display: none !important;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ---- Card Grid ---- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      padding: 16px 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background-color var(--transition-fast);
    }

    .card:hover {
      border-color: var(--neon-cyan);
      background: var(--bg-card-hover);
    }

    .card.selected {
      border-color: var(--neon-green);
      box-shadow: var(--glow-green);
      background: var(--bg-card-selected);
    }

    .card .card-name {
      font-size: 0.85rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .card .card-risk {
      font-size: 0.7rem;
      color: var(--neon-pink);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* ---- Experience Selector ---- */
    .experience-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 20px 0;
      flex-wrap: wrap;
    }

    .exp-btn {
      background: var(--bg-card);
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      padding: 14px 20px;
      cursor: pointer;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      text-align: center;
      transition: all var(--transition-fast);
      min-width: 140px;
    }

    .exp-btn:hover {
      border-color: var(--neon-cyan);
    }

    .exp-btn.selected {
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
      color: var(--neon-cyan);
    }

    .exp-btn .exp-label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ---- CTA Button ---- */
    .cta-container {
      text-align: center;
      padding: 30px 0;
    }

    .language-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 0 auto 18px auto;
      padding: 10px 14px;
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      max-width: max-content;
      background: rgba(22, 33, 62, 0.42);
    }

    .language-toggle-label {
      color: var(--text-secondary);
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .lang-btn {
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 1px;
      padding: 8px 12px;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: border-color var(--transition-fast), color var(--transition-fast), box-shadow var(--transition-fast), background-color var(--transition-fast);
    }

    .lang-btn.is-active {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
      background: rgba(0, 212, 255, 0.08);
    }

    .cta-btn {
      background: transparent;
      border: 2px solid var(--neon-pink);
      color: var(--neon-pink);
      font-family: var(--font-mono);
      font-size: 1.2rem;
      padding: 16px 48px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all var(--transition-normal);
      border-radius: var(--border-radius);
    }

    .cta-btn:hover:not(:disabled) {
      box-shadow: var(--glow-pink);
      text-shadow: var(--glow-pink);
      background: rgba(255,46,151,0.1);
    }

    .cta-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    /* ---- View Containers ---- */
    #results-view {
      display: none;
    }

    .view-active {
      display: block;
    }

    /* ---- Title / Heading ---- */
    .page-title {
      text-align: center;
      color: var(--neon-green);
      font-size: 1.8rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .page-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .section-label {
      color: var(--neon-cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--text-dim);
    }

    /* ---- Results Panel ---- */
    .results-panel {
      display: grid;
      gap: 18px;
      max-width: 860px;
      margin: 0 auto;
    }

    .results-card {
      background: rgba(22, 33, 62, 0.72);
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      padding: 20px;
    }

    .results-reveal {
      opacity: 0;
      transform: translateY(16px);
    }

    .results-panel.results-visible .results-reveal {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .results-panel.results-visible .countdown-card { transition-delay: 0ms; }
    .results-panel.results-visible .gauge-card { transition-delay: 80ms; }
    .results-panel.results-visible .roast-card { transition-delay: 160ms; }

    .results-card-heading {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 16px 0;
      border-bottom: 1px solid var(--text-dim);
      padding-bottom: 8px;
    }

    .result-job-name {
      font-size: 1rem;
      color: var(--neon-cyan);
      text-align: center;
      letter-spacing: 1px;
      margin: 0 0 4px 0;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .countdown-unit {
      text-align: center;
    }

    .countdown-value {
      font-size: 3rem;
      color: var(--neon-green);
      line-height: 1;
      display: block;
    }

    .countdown-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
      display: block;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .gauge-svg {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    .gauge-arc-bg {
      fill: none;
      stroke: var(--text-dim);
      stroke-width: 6;
    }

    .gauge-arc-zone {
      fill: none;
      stroke-width: 6;
    }

    .gauge-needle-line {
      stroke: var(--neon-pink);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .gauge-cap {
      fill: var(--text-secondary);
    }

    .gauge-label-edge {
      font-size: 11px;
      fill: var(--text-secondary);
    }

    #gauge-needle {
      transform-box: fill-box;
      transform-origin: center bottom;
      transform: rotate(-90deg);
      transition: transform 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .gauge-summary {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    #risk-label {
      color: var(--neon-cyan);
      font-weight: bold;
      letter-spacing: 1px;
    }

    #risk-score {
      color: var(--text-secondary);
    }

    .roast-card {
      border-color: var(--neon-pink);
      border-left: 3px solid var(--neon-pink);
    }

    #roast-message {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-primary);
      margin: 0;
      font-style: italic;
    }

    @media (max-width: 640px) {
      .countdown-value { font-size: 2.4rem; }
    }

    .try-again-container {
      text-align: center;
      margin-top: 32px;
    }

    .share-actions {
      margin-top: 28px;
      padding: 18px;
      border: 1px solid var(--neon-cyan);
      border-radius: var(--border-radius);
      box-shadow: var(--glow-cyan);
      background: rgba(0, 212, 255, 0.05);
    }

    .share-actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .share-btn {
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      letter-spacing: 1px;
      padding: 10px 16px;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: box-shadow var(--transition-fast), background-color var(--transition-fast), color var(--transition-fast);
    }

    .share-btn:hover {
      box-shadow: var(--glow-cyan);
      background: rgba(0, 212, 255, 0.12);
    }

    .try-again-btn {
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 10px 30px;
      cursor: pointer;
      margin-top: 20px;
      border-radius: var(--border-radius);
      transition: all var(--transition-fast);
    }

    .try-again-btn:hover {
      box-shadow: var(--glow-cyan);
      background: rgba(0,212,255,0.1);
    }

    /* ---- Focus States ---- */
    .card:focus-visible,
    .exp-btn:focus-visible,
    .lang-btn:focus-visible,
    .share-btn:focus-visible,
    .cta-btn:focus-visible,
    .try-again-btn:focus-visible {
      outline: 2px solid var(--neon-cyan);
      outline-offset: 2px;
      box-shadow: var(--glow-cyan);
    }

    /* ---- Neon Glow (VIS-02) ---- */
    .page-title {
      text-shadow: var(--neon-glow-green);
    }

    .countdown-value {
      text-shadow: var(--neon-glow-green);
    }

    .results-card-heading {
      text-shadow: var(--neon-glow-cyan);
    }

    /* ---- Scanlines Overlay (VIS-03) ---- */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.18) 2px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    /* ---- Glitch Animation (VIS-04) ---- */
    #results-view .page-title {
      position: relative;
    }

    #results-view .page-title::before,
    #results-view .page-title::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      background: var(--bg-primary);
      overflow: hidden;
    }

    #results-view .page-title::before {
      color: var(--neon-cyan);
      clip-path: inset(0 0 60% 0);
    }

    #results-view .page-title::after {
      color: var(--neon-pink);
      clip-path: inset(55% 0 0 0);
    }

    #results-view .page-title.glitch-active::before {
      animation: glitch-top 0.6s steps(4) 1 forwards;
    }

    #results-view .page-title.glitch-active::after {
      animation: glitch-bot 0.6s steps(4) 1 forwards;
    }

    @keyframes glitch-top {
      0%   { clip-path: inset(0% 0 70% 0);  transform: translateX(-4px); }
      25%  { clip-path: inset(15% 0 50% 0); transform: translateX(3px);  }
      50%  { clip-path: inset(5% 0 65% 0);  transform: translateX(-2px); }
      75%  { clip-path: inset(20% 0 40% 0); transform: translateX(4px);  }
      100% { clip-path: inset(0 0 100% 0);  transform: translateX(0);    }
    }

    @keyframes glitch-bot {
      0%   { clip-path: inset(60% 0 0% 0);  transform: translateX(4px);  }
      25%  { clip-path: inset(70% 0 0 0);   transform: translateX(-3px); }
      50%  { clip-path: inset(55% 0 0 0);   transform: translateX(2px);  }
      75%  { clip-path: inset(75% 0 0 0);   transform: translateX(-4px); }
      100% { clip-path: inset(100% 0 0 0);  transform: translateX(0);    }
    }

    /* ---- Reduced Motion ---- */
    @media (prefers-reduced-motion: reduce) {
      #results-view .page-title.glitch-active::before,
      #results-view .page-title.glitch-active::after {
        animation: none;
      }

      .results-panel.results-visible .results-reveal {
        transition-duration: 0.001ms;
      }
    }

    /* ---- Mobile Layout (VIS-05) ---- */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 12px;
      }

      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 8px;
      }

      .card {
        padding: 12px 8px;
      }

      .card .card-name {
        font-size: 0.78rem;
      }

      .cta-btn {
        padding: 12px 24px;
        font-size: 1rem;
        width: 100%;
      }

      .exp-btn {
        min-width: 120px;
        padding: 12px 14px;
        font-size: 0.8rem;
      }

      .page-title {
        font-size: 1.3rem;
        letter-spacing: 1px;
      }

      .countdown-value {
        font-size: 2rem;
      }

      .countdown-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .share-actions-row {
        flex-direction: column;
      }

      .share-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body data-booting="true">
  <div class="language-toggle" id="language-toggle" aria-label="Language selector">
    <span class="language-toggle-label" id="language-toggle-label">Language</span>
    <button type="button" class="lang-btn" data-lang="en">EN</button>
    <button type="button" class="lang-btn" data-lang="ptbr">PT-BR</button>
  </div>

  <div id="input-view">
    <div class="container">
      <h1 class="page-title" id="input-title">AI Job Death Clock</h1>
      <p class="page-subtitle" id="input-subtitle">Find out when the machines come for your job</p>

      <div class="section-label" id="profession-label">Choose your profession</div>
      <div class="card-grid" id="card-grid">
        <!-- Cards rendered by JS -->
      </div>

      <div class="section-label" id="experience-label">Years of experience</div>
      <div class="experience-selector" id="experience-selector">
        <!-- Buttons rendered by JS -->
      </div>

      <div class="cta-container">
        <button class="cta-btn" id="cta-btn" disabled>SEE YOUR FATE</button>
      </div>
    </div>
  </div>

  <div id="results-view">
    <div class="container">
      <h1 class="page-title" id="results-title">Your fate is sealed</h1>
      <div class="results-panel" id="results-panel">

        <p class="result-job-name" id="result-job-name">--</p>

        <section class="results-card results-reveal countdown-card">
          <p class="results-card-heading" id="countdown-heading">Estimated Shelf Life</p>
          <div class="countdown-grid">
            <div class="countdown-unit">
              <span class="countdown-value" id="countdown-years">0</span>
              <span class="countdown-label" id="countdown-years-label">Years</span>
            </div>
            <div class="countdown-unit">
              <span class="countdown-value" id="countdown-months">0</span>
              <span class="countdown-label" id="countdown-months-label">Months</span>
            </div>
            <div class="countdown-unit">
              <span class="countdown-value" id="countdown-days">0</span>
              <span class="countdown-label" id="countdown-days-label">Days</span>
            </div>
          </div>
        </section>

        <section class="results-card results-reveal gauge-card">
          <p class="results-card-heading" id="gauge-heading">Automation Danger</p>
          <svg class="gauge-svg" viewBox="0 0 240 160" aria-hidden="true">
            <path class="gauge-arc-bg" d="M20 140 A100 100 0 0 1 220 140" />
            <path class="gauge-arc-zone" d="M20 140 A100 100 0 0 1 70 58" style="stroke: var(--neon-green); opacity: 0.3" />
            <path class="gauge-arc-zone" d="M70 58 A100 100 0 0 1 120 40" style="stroke: var(--neon-cyan); opacity: 0.3" />
            <path class="gauge-arc-zone" d="M120 40 A100 100 0 0 1 170 58" style="stroke: var(--neon-yellow); opacity: 0.3" />
            <path class="gauge-arc-zone" d="M170 58 A100 100 0 0 1 220 140" style="stroke: var(--neon-pink); opacity: 0.3" />
            <g id="gauge-needle">
              <line class="gauge-needle-line" x1="120" y1="140" x2="120" y2="52" />
            </g>
            <circle class="gauge-cap" cx="120" cy="140" r="8" />
            <text class="gauge-label-edge" id="gauge-safe-label" x="14" y="158">SAFE</text>
            <text class="gauge-label-edge" id="gauge-doomed-label" x="195" y="158">DOOMED</text>
          </svg>
          <div class="gauge-summary">
            <span id="risk-label">--</span>
            <span id="risk-score">0.0 / 10</span>
          </div>
        </section>

        <section class="results-card results-reveal roast-card">
          <p class="results-card-heading" id="roast-heading">Final Verdict</p>
          <p id="roast-message">--</p>
        </section>

      </div>
      <section class="share-actions" id="share-actions">
        <p class="results-card-heading" id="share-heading">Share This Doom</p>
        <div class="share-actions-row">
          <button type="button" class="share-btn" id="share-x-btn">X / Twitter</button>
          <button type="button" class="share-btn" id="share-whatsapp-btn">WhatsApp</button>
          <button type="button" class="share-btn" id="share-linkedin-btn">LinkedIn</button>
        </div>
      </section>
      <div class="try-again-container">
        <button class="try-again-btn" id="try-again-btn">&#x21BB; TRY AGAIN</button>
      </div>
    </div>
  </div>

  <script>
    // ===== DATA =====

    const OCCUPATIONS = [
      { id: 'medical-transcriptionists', name: 'Medical Transcriptionists', baseScore: 10 },
      { id: 'software-developers', name: 'Software Developers / Engineers', baseScore: 9 },
      { id: 'data-scientists', name: 'Data Scientists / Analysts', baseScore: 9 },
      { id: 'financial-analysts', name: 'Financial Analysts', baseScore: 9 },
      { id: 'graphic-designers', name: 'Graphic Designers', baseScore: 9 },
      { id: 'financial-clerks', name: 'Bank / Finance Clerk', baseScore: 9 },
      { id: 'general-office-clerks', name: 'General Office Clerks', baseScore: 9 },
      { id: 'accountants-auditors', name: 'Accountants and Auditors', baseScore: 8.5 },
      { id: 'lawyers', name: 'Lawyers', baseScore: 8 },
      { id: 'paralegals', name: 'Paralegals & Legal Assistants', baseScore: 8 },
      { id: 'systems-analysts', name: 'IT Systems Analyst', baseScore: 8 },
      { id: 'support-specialists', name: 'IT Help Desk / Support', baseScore: 8 },
      { id: 'financial-managers', name: 'Financial Managers', baseScore: 7.5 },
      { id: 'hr-specialists', name: 'Human Resources (RH)', baseScore: 7.5 },

    function getOccupationById(occupationId) {
      for (var i = 0; i < OCCUPATIONS.length; i++) {
        if (OCCUPATIONS[i].id === occupationId) return OCCUPATIONS[i];
      }
      return null;
    }

    function getSeniorityByExperienceId(experienceId) {
      for (var i = 0; i < SENIORITY_LEVELS.length; i++) {
        if (SENIORITY_LEVELS[i].experienceId === experienceId) return SENIORITY_LEVELS[i];
      }
      return null;
    }

    function calculateAdjustedScore(baseScore, slevel) {
      return Math.max(0, Math.min(10, baseScore - (slevel * 1.5)));
    }

    function calculateShelfLifeYears(adjustedScore) {
      return Math.max(0, Math.min(12, (10 - adjustedScore) * 1.2));
    }

    function splitShelfLife(shelfLifeYears) {
      var totalDays = Math.round(shelfLifeYears * 365);
      var years = Math.floor(totalDays / 365);
      var months = Math.floor((totalDays % 365) / 30);
      var days = (totalDays % 365) % 30;
      return { years: years, months: months, days: days, totalDays: totalDays };
    }

    function getRiskBand(adjustedScore) {
      for (var i = 0; i < RISK_BANDS.length; i++) {
        var band = RISK_BANDS[i];
        if (adjustedScore >= band.min && adjustedScore < band.max) {
          var needleAngle = -90 + (band.needlePercent * 1.8);
          return {
            key: band.key,
            label: band.label,
            needlePercent: band.needlePercent,
            needleAngle: needleAngle,
            colorVar: band.colorVar
          };
        }
      }
      return null;
    }

    function buildRoast(occupation, seniority, riskBand) {
      if (!occupation || !seniority || !riskBand) return '';
      return [ROAST_OPENERS[occupation.id], ROAST_MIDDLES[riskBand.key], ROAST_CLOSERS[seniority.id]].join(' ');
    }

    function buildResultModel(occupationId, experienceId) {
      var occupation = getOccupationById(occupationId);
      var seniority = getSeniorityByExperienceId(experienceId);
      if (!occupation || !seniority) return null;
      var adjustedScore = calculateAdjustedScore(occupation.baseScore, seniority.slevel);
      var shelfLifeYears = calculateShelfLifeYears(adjustedScore);
      var countdown = splitShelfLife(shelfLifeYears);
      var risk = getRiskBand(adjustedScore);
      var roast = buildRoast(occupation, seniority, risk);
      return {
        occupation: occupation,
        seniority: seniority,
        adjustedScore: adjustedScore,
        shelfLifeYears: shelfLifeYears,
        countdown: countdown,
        risk: risk,
        roast: roast
      };
    }

    function buildResultMatrix() {
      var results = [];
      OCCUPATIONS.forEach(function(occupation) {
        SENIORITY_LEVELS.forEach(function(seniority) {
          results.push(buildResultModel(occupation.id, seniority.experienceId));
        });
      });
      return results;
    }

      document.getElementById('profession-label').textContent = t('professionLabel', currentLanguage);
      document.getElementById('experience-label').textContent = t('experienceLabel', currentLanguage);
      document.getElementById('cta-btn').textContent = t('ctaLabel', currentLanguage);
      document.getElementById('results-title').textContent = t('resultsTitle', currentLanguage);
      document.getElementById('results-title').setAttribute('data-text', t('resultsTitle', currentLanguage));
      document.getElementById('countdown-heading').textContent = t('shelfLifeHeading', currentLanguage);
      document.getElementById('countdown-years-label').textContent = t('countdownYears', currentLanguage);
      document.getElementById('countdown-months-label').textContent = t('countdownMonths', currentLanguage);
      document.getElementById('countdown-days-label').textContent = t('countdownDays', currentLanguage);
      document.getElementById('gauge-heading').textContent = t('automationDangerHeading', currentLanguage);
      document.getElementById('gauge-safe-label').textContent = t('safeLabel', currentLanguage);
      document.getElementById('gauge-doomed-label').textContent = t('doomedLabel', currentLanguage);
      document.getElementById('roast-heading').textContent = t('finalVerdictHeading', currentLanguage);
      document.getElementById('share-heading').textContent = t('shareHeading', currentLanguage);
      document.getElementById('share-x-btn').textContent = t('shareXLabel', currentLanguage);
      document.getElementById('share-whatsapp-btn').textContent = t('shareWhatsAppLabel', currentLanguage);
      document.getElementById('share-linkedin-btn').textContent = t('shareLinkedInLabel', currentLanguage);
      document.getElementById('try-again-btn').textContent = t('tryAgainLabel', currentLanguage);
      document.getElementById('language-toggle-label').textContent = t('languageLabel', currentLanguage);
      document.querySelector('.lang-btn[data-lang="en"]').setAttribute('aria-label', t('languageEnglish', currentLanguage));
      document.querySelector('.lang-btn[data-lang="ptbr"]').setAttribute('aria-label', t('languagePortuguese', currentLanguage));
    }

    function renderResultContent(result) {
      if (!result) return;
      document.getElementById('result-job-name').textContent =
        getOccupationLabel(result.occupation.id, currentLanguage) +
        ' // ' +
        getSeniorityLabel(result.seniority.id, currentLanguage);
      document.getElementById('countdown-years').textContent = String(result.countdown.years);
      document.getElementById('countdown-months').textContent = String(result.countdown.months);
      document.getElementById('countdown-days').textContent = String(result.countdown.days);
      document.getElementById('risk-label').textContent = getRiskLabel(result.risk.key, currentLanguage);
      document.getElementById('risk-label').style.color = 'var(' + result.risk.colorVar + ')';
      document.getElementById('risk-score').textContent =
        t('riskPrefix', currentLanguage) + ': ' + result.adjustedScore.toFixed(1) + ' / 10';
      document.getElementById('roast-message').textContent = buildLocalizedRoast(result, currentLanguage);
    }

    function syncLanguageControls() {
      document.querySelectorAll('.lang-btn').forEach(function(button) {
        var isActive = button.dataset.lang === currentLanguage;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    function applyLanguage(language) {
      if (!isSupportedLanguage(language)) {
        language = DEFAULT_LANGUAGE;
      }
      currentLanguage = language;
      try {
        localStorage.setItem(LANGUAGE_STORAGE_KEY, currentLanguage);
      } catch (error) {
        // Ignore storage failures so the UI can still rerender in-memory.
      }
      document.documentElement.lang = currentLanguage === 'ptbr' ? 'pt-BR' : 'en';
      document.title = t('documentTitle', currentLanguage);
      renderCards();
      renderExperienceSelector();
      renderStaticLabels();
      if (lastResult) {
        renderResultContent(lastResult);
        syncHashWithResult(lastResult);
      }
      updateCTA();
      syncLanguageControls();
    }

    function renderCards() {
      const grid = document.getElementById('card-grid');
      grid.replaceChildren();
      OCCUPATIONS.forEach(function(occ) {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-id', occ.id);
        if (occ.id === selectedOccupation) {
          card.classList.add('selected');
        }
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');

        const cardName = document.createElement('div');
        cardName.className = 'card-name';
        cardName.textContent = getOccupationLabel(occ.id, currentLanguage);

        const cardRisk = document.createElement('div');
        cardRisk.className = 'card-risk';
        cardRisk.textContent = t('riskPrefix', currentLanguage) + ': ' + occ.baseScore + '/10';

        card.appendChild(cardName);
        card.appendChild(cardRisk);
        card.addEventListener('click', function() {
          selectCard(occ.id);
        });
        card.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            selectCard(occ.id);
          }
        });
        grid.appendChild(card);
      });
    }

    function renderExperienceSelector() {
      const selector = document.getElementById('experience-selector');
      selector.replaceChildren();
      SENIORITY_LEVELS.forEach(function(level) {
        const btn = document.createElement('button');
        btn.className = 'exp-btn';
        btn.setAttribute('data-id', level.experienceId);
        btn.type = 'button';
        if (level.experienceId === selectedExperience) {
          btn.classList.add('selected');
        }

        const label = document.createElement('span');
        label.textContent = getSeniorityLabel(level.id, currentLanguage);

        const range = document.createElement('span');
        range.className = 'exp-label';
        range.textContent = getSeniorityRangeLabel(level.experienceId, currentLanguage);

        btn.appendChild(label);
        btn.appendChild(range);
        btn.addEventListener('click', function() {
          selectExperience(level.experienceId);
        });
        selector.appendChild(btn);
      });
    }

    function selectCard(id) {
      selectedOccupation = id;
      document.querySelectorAll('.card').forEach(function(c) {
        c.classList.remove('selected');
      });
      var target = document.querySelector('.card[data-id="' + id + '"]');
      if (target) target.classList.add('selected');
      updateCTA();
    }

    function selectExperience(experienceId) {
      selectedExperience = experienceId;
      document.querySelectorAll('.exp-btn').forEach(function(b) {
        b.classList.remove('selected');
      });
      var target = document.querySelector('.exp-btn[data-id="' + experienceId + '"]');
      if (target) target.classList.add('selected');
      updateCTA();
    }

    function updateCTA() {
      var btn = document.getElementById('cta-btn');
      if (selectedOccupation && selectedExperience) {
        btn.removeAttribute('disabled');
      } else {
        btn.setAttribute('disabled', 'disabled');
      }
    }

    function showResults(result) {
      lastResult = result;
      document.getElementById('input-view').style.display = 'none';
      document.getElementById('results-view').style.display = 'block';
      renderResultContent(result);
      syncHashWithResult(result);

      var panel = document.getElementById('results-panel');
      var needle = document.getElementById('gauge-needle');
      panel.classList.remove('results-visible');
      needle.style.transform = 'rotate(-90deg)';

      requestAnimationFrame(function() {
        var title = document.getElementById('results-title');
        title.setAttribute('data-text', title.textContent);
        title.classList.add('glitch-active');
        panel.classList.add('results-visible');
        needle.style.transform = 'rotate(' + result.risk.needleAngle + 'deg)';
      });
    }

    function resetResultState() {
      lastResult = null;
      var panel = document.getElementById('results-panel');
      panel.classList.remove('results-visible');
      document.getElementById('result-job-name').textContent = '--';
      document.getElementById('countdown-years').textContent = '0';
      document.getElementById('countdown-months').textContent = '0';
      document.getElementById('countdown-days').textContent = '0';
      document.getElementById('risk-label').textContent = '--';
      document.getElementById('risk-label').style.color = 'var(--neon-cyan)';
      document.getElementById('risk-score').textContent = '0.0 / 10';
      document.getElementById('roast-message').textContent = '--';
      document.getElementById('gauge-needle').style.transform = 'rotate(-90deg)';
      document.querySelector('#results-view .page-title').classList.remove('glitch-active');
    }

    function showInput() {
      document.getElementById('results-view').style.display = 'none';
      document.getElementById('input-view').style.display = 'block';
    }

    // ===== SHARE =====

    function serializeShareState(state) {
      var params = new URLSearchParams();
      if (state && state.job) {
        params.set('job', state.job);
      }
      if (state && state.exp) {
        params.set('exp', state.exp);
      }
      if (state && state.lang) {
        params.set('lang', state.lang);
      }
      return params.toString();
    }

    function parseShareState(hash) {
      var rawHash = hash || '';
      var normalizedHash = rawHash.charAt(0) === '#' ? rawHash.slice(1) : rawHash;
      var params = new URLSearchParams(normalizedHash);
      return {
        job: params.get('job') || '',
        exp: params.get('exp') || '',
        lang: params.get('lang') || ''
      };
    }

    function buildShareState(result) {
      if (!result || !result.occupation || !result.seniority) {
        return null;
      }
      return {
        job: result.occupation.id,
        exp: result.seniority.experienceId,
        lang: currentLanguage
      };
    }

    function buildBasePageUrl() {
      return window.location.origin + window.location.pathname;
    }

    function buildStateUrl(state) {
      return buildBasePageUrl() + '#' + serializeShareState(state);
    }

    function buildShareMessage(result, language) {
      if (!result) return '';
      var resultUrl = buildStateUrl(buildShareState(result));
      var occupationLabel = getOccupationLabel(result.occupation.id, language);
      var seniorityLabel = getSeniorityLabel(result.seniority.id, language);
      var countdown = result.countdown;

      if (language === 'ptbr') {
        return occupationLabel +
          ' // ' +
          seniorityLabel +
          ': ' +
          countdown.years +
          ' anos, ' +
          countdown.months +
          ' meses e ' +
          countdown.days +
          ' dias ate a IA te atropelar.\n\nVeja seu destino: ' +
          resultUrl;
      }

      return occupationLabel +
        ' // ' +
        seniorityLabel +
        ': ' +
        countdown.years +
        ' years, ' +
        countdown.months +
        ' months, and ' +
        countdown.days +
        ' days until AI clocks you out.\n\nSee your doom: ' +
        resultUrl;
    }

    function buildXShareUrl(result, language) {
      var params = new URLSearchParams();
      params.set('text', buildShareMessage(result, language));
      params.set('url', buildStateUrl(buildShareState(result)));
      return 'https://twitter.com/intent/tweet?' + params.toString();
    }

    function buildWhatsAppShareUrl(result, language) {
      var params = new URLSearchParams();
      params.set('text', buildShareMessage(result, language));
      return 'https://api.whatsapp.com/send?' + params.toString();
    }

    function buildLinkedInShareUrl(result) {
      return 'https://www.linkedin.com/sharing/share-offsite/?url=' +
        encodeURIComponent(buildStateUrl(buildShareState(result)));
    }

    function openShareWindow(url) {
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function syncHashWithResult(result) {
      history.replaceState(null, '', buildStateUrl(buildShareState(result)));
    }

    function clearResultHash() {
      history.replaceState(null, '', buildBasePageUrl());
    }

    function hydrateFromHash() {
      var parsedHash = parseShareState(window.location.hash);
      var initialLanguage = resolveInitialLanguage(parsedHash);
      var occupation = getOccupationById(parsedHash.job);
      var seniority = getSeniorityByExperienceId(parsedHash.exp);

      if (occupation && seniority) {
        var result = buildResultModel(parsedHash.job, parsedHash.exp);
        applyLanguage(initialLanguage);
        showResults(result);
        return true;
      }

      return false;
    }

    // ===== BOOT =====

    function resolveInitialLanguage(parsedHash) {
      if (parsedHash && isSupportedLanguage(parsedHash.lang)) {
        return parsedHash.lang;
      }
      try {
        var storedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);
        if (isSupportedLanguage(storedLanguage)) {
          return storedLanguage;
        }
      } catch (error) {
        // Ignore storage failures and fall back to the default locale.
      }
      return DEFAULT_LANGUAGE;
    }

    function init() {
      var parsedHash = parseShareState(window.location.hash);
      currentLanguage = resolveInitialLanguage(parsedHash);
      document.documentElement.lang = currentLanguage === 'ptbr' ? 'pt-BR' : 'en';
      document.title = t('documentTitle', currentLanguage);
      renderCards();
      renderExperienceSelector();
      renderStaticLabels();
      updateCTA();
      syncLanguageControls();
      document.querySelectorAll('.lang-btn').forEach(function(button) {
        button.addEventListener('click', function() {
          applyLanguage(button.dataset.lang);
        });
      });
      document.getElementById('cta-btn').addEventListener('click', function() {
        var result = buildResultModel(selectedOccupation, selectedExperience);
        if (result) {
          showResults(result);
        }
      });
      document.getElementById('share-x-btn').addEventListener('click', function() {
        if (!lastResult) return;
        openShareWindow(buildXShareUrl(lastResult, currentLanguage));
      });
      document.getElementById('share-whatsapp-btn').addEventListener('click', function() {
        if (!lastResult) return;
        openShareWindow(buildWhatsAppShareUrl(lastResult, currentLanguage));
      });
      document.getElementById('share-linkedin-btn').addEventListener('click', function() {
        if (!lastResult) return;
        openShareWindow(buildLinkedInShareUrl(lastResult));
      });
      document.getElementById('try-again-btn').addEventListener('click', function() {
        resetResultState();
        clearResultHash();
        showInput();
      });

      if (!hydrateFromHash()) {
        showInput();
      }

      document.body.removeAttribute('data-booting');
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
