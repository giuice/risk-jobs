<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Job Death Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-hover: #1f2b47;
      --bg-card-selected: #0d2137;
      --neon-green: #00ff41;
      --neon-cyan: #00d4ff;
      --neon-pink: #ff2e97;
      --neon-yellow: #ffd700;
      --text-primary: #e0e0e0;
      --text-secondary: #8892b0;
      --text-dim: #4a5568;
      --font-mono: 'Share Tech Mono', 'Courier New', 'Consolas', monospace;
      --glow-green: 0 0 10px rgba(0,255,65,0.4), 0 0 20px rgba(0,255,65,0.2);
      --glow-pink: 0 0 10px rgba(255,46,151,0.4), 0 0 20px rgba(255,46,151,0.2);
      --glow-cyan: 0 0 10px rgba(0,212,255,0.4), 0 0 20px rgba(0,212,255,0.2);
      --transition-fast: 0.15s ease;
      --transition-normal: 0.3s ease;
      --border-radius: 4px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-mono);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ---- Card Grid ---- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 20px 0;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      padding: 16px 12px;
      cursor: pointer;
      text-align: center;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .card:hover {
      border-color: var(--neon-cyan);
      background: var(--bg-card-hover);
    }

    .card.selected {
      border-color: var(--neon-green);
      box-shadow: var(--glow-green);
    }

    .card .card-name {
      font-size: 0.85rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .card .card-risk {
      font-size: 0.7rem;
      color: var(--neon-pink);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* ---- Experience Selector ---- */
    .experience-selector {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 20px 0;
      flex-wrap: wrap;
    }

    .exp-btn {
      background: var(--bg-card);
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      padding: 14px 20px;
      cursor: pointer;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      text-align: center;
      transition: all var(--transition-fast);
      min-width: 140px;
    }

    .exp-btn:hover {
      border-color: var(--neon-cyan);
    }

    .exp-btn.selected {
      border-color: var(--neon-cyan);
      box-shadow: var(--glow-cyan);
      color: var(--neon-cyan);
    }

    .exp-btn .exp-label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ---- CTA Button ---- */
    .cta-container {
      text-align: center;
      padding: 30px 0;
    }

    .cta-btn {
      background: transparent;
      border: 2px solid var(--neon-pink);
      color: var(--neon-pink);
      font-family: var(--font-mono);
      font-size: 1.2rem;
      padding: 16px 48px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all var(--transition-normal);
      border-radius: var(--border-radius);
    }

    .cta-btn:hover:not(:disabled) {
      box-shadow: var(--glow-pink);
      text-shadow: var(--glow-pink);
      background: rgba(255,46,151,0.1);
    }

    .cta-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    /* ---- View Containers ---- */
    #results-view {
      display: none;
    }

    .view-active {
      display: block;
    }

    /* ---- Title / Heading ---- */
    .page-title {
      text-align: center;
      color: var(--neon-green);
      font-size: 1.8rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .page-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .section-label {
      color: var(--neon-cyan);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--text-dim);
    }

    /* ---- Results Panel ---- */
    .results-panel {
      display: grid;
      gap: 18px;
      max-width: 860px;
      margin: 0 auto;
    }

    .results-card {
      background: rgba(22, 33, 62, 0.72);
      border: 1px solid var(--text-dim);
      border-radius: var(--border-radius);
      padding: 20px;
    }

    .results-reveal {
      opacity: 0;
      transform: translateY(16px);
    }

    .results-panel.results-visible .results-reveal {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .results-panel.results-visible .countdown-card { transition-delay: 0ms; }
    .results-panel.results-visible .gauge-card { transition-delay: 80ms; }
    .results-panel.results-visible .roast-card { transition-delay: 160ms; }

    .results-card-heading {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 16px 0;
      border-bottom: 1px solid var(--text-dim);
      padding-bottom: 8px;
    }

    .result-job-name {
      font-size: 1rem;
      color: var(--neon-cyan);
      text-align: center;
      letter-spacing: 1px;
      margin: 0 0 4px 0;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .countdown-unit {
      text-align: center;
    }

    .countdown-value {
      font-size: 3rem;
      color: var(--neon-green);
      line-height: 1;
      display: block;
    }

    .countdown-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
      display: block;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .gauge-svg {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    .gauge-arc-bg {
      fill: none;
      stroke: var(--text-dim);
      stroke-width: 6;
    }

    .gauge-needle-line {
      stroke: var(--neon-pink);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .gauge-cap {
      fill: var(--text-secondary);
    }

    .gauge-label-edge {
      font-size: 11px;
      fill: var(--text-secondary);
    }

    #gauge-needle {
      transform-box: fill-box;
      transform-origin: center bottom;
      transform: rotate(-90deg);
      transition: transform 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .gauge-summary {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    #risk-label {
      color: var(--neon-cyan);
      font-weight: bold;
      letter-spacing: 1px;
    }

    #risk-score {
      color: var(--text-secondary);
    }

    #roast-message {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-primary);
      margin: 0;
    }

    @media (max-width: 640px) {
      .countdown-grid { grid-template-columns: 1fr; }
      .countdown-value { font-size: 2.4rem; }
    }

    .try-again-btn {
      background: transparent;
      border: 1px solid var(--neon-cyan);
      color: var(--neon-cyan);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      padding: 10px 30px;
      cursor: pointer;
      margin-top: 20px;
      border-radius: var(--border-radius);
      transition: all var(--transition-fast);
    }

    .try-again-btn:hover {
      box-shadow: var(--glow-cyan);
      background: rgba(0,212,255,0.1);
    }
  </style>
</head>
<body>

  <div id="input-view">
    <div class="container">
      <h1 class="page-title">AI Job Death Clock</h1>
      <p class="page-subtitle">Find out when the machines come for your job</p>

      <div class="section-label">Choose your profession</div>
      <div class="card-grid" id="card-grid">
        <!-- Cards rendered by JS -->
      </div>

      <div class="section-label">Years of experience</div>
      <div class="experience-selector" id="experience-selector">
        <!-- Buttons rendered by JS -->
      </div>

      <div class="cta-container">
        <button class="cta-btn" id="cta-btn" disabled>SEE YOUR FATE</button>
      </div>
    </div>
  </div>

  <div id="results-view">
    <div class="container">
      <h1 class="page-title">Your fate is sealed</h1>
      <div class="results-panel" id="results-panel">

        <p class="result-job-name" id="result-job-name">--</p>

        <section class="results-card results-reveal countdown-card">
          <p class="results-card-heading">Estimated Shelf Life</p>
          <div class="countdown-grid">
            <div class="countdown-unit">
              <span class="countdown-value" id="countdown-years">0</span>
              <span class="countdown-label">Years</span>
            </div>
            <div class="countdown-unit">
              <span class="countdown-value" id="countdown-months">0</span>
              <span class="countdown-label">Months</span>
            </div>
            <div class="countdown-unit">
              <span class="countdown-value" id="countdown-days">0</span>
              <span class="countdown-label">Days</span>
            </div>
          </div>
        </section>

        <section class="results-card results-reveal gauge-card">
          <p class="results-card-heading">Automation Danger</p>
          <svg class="gauge-svg" viewBox="0 0 240 160" aria-hidden="true">
            <path class="gauge-arc-bg" d="M20 140 A100 100 0 0 1 220 140" />
            <g id="gauge-needle">
              <line class="gauge-needle-line" x1="120" y1="140" x2="120" y2="52" />
            </g>
            <circle class="gauge-cap" cx="120" cy="140" r="8" />
            <text class="gauge-label-edge" x="14" y="158">SAFE</text>
            <text class="gauge-label-edge" x="195" y="158">DOOMED</text>
          </svg>
          <div class="gauge-summary">
            <span id="risk-label">--</span>
            <span id="risk-score">0.0 / 10</span>
          </div>
        </section>

        <section class="results-card results-reveal roast-card">
          <p class="results-card-heading">Final Verdict</p>
          <p id="roast-message">--</p>
        </section>

      </div>
      <div style="text-align: center; margin-top: 30px;">
        <button class="try-again-btn" id="try-again-btn">&#x21BB; TRY AGAIN</button>
      </div>
    </div>
  </div>

  <script>
    // ===== DATA =====

    const OCCUPATIONS = [
      { id: 'medical-transcriptionists', name: 'Medical Transcriptionists', baseScore: 10 },
      { id: 'software-developers', name: 'Software Developers / Engineers', baseScore: 9 },
      { id: 'data-scientists', name: 'Data Scientists / Analysts', baseScore: 9 },
      { id: 'financial-analysts', name: 'Financial Analysts', baseScore: 9 },
      { id: 'graphic-designers', name: 'Graphic Designers', baseScore: 9 },
      { id: 'financial-clerks', name: 'Financial Clerks', baseScore: 9 },
      { id: 'general-office-clerks', name: 'General Office Clerks', baseScore: 9 },
      { id: 'accountants-auditors', name: 'Accountants and Auditors', baseScore: 8.5 },
      { id: 'lawyers', name: 'Lawyers', baseScore: 8 },
      { id: 'paralegals', name: 'Paralegals & Legal Assistants', baseScore: 8 },
      { id: 'systems-analysts', name: 'Computer Systems Analysts', baseScore: 8 },
      { id: 'support-specialists', name: 'Computer Support Specialists', baseScore: 8 },
      { id: 'financial-managers', name: 'Financial Managers', baseScore: 7.5 },
      { id: 'hr-specialists', name: 'HR Specialists', baseScore: 7.5 },
      { id: 'medical-records', name: 'Medical Records Specialists', baseScore: 7.5 },
      { id: 'customer-service', name: 'Customer Service Representatives', baseScore: 7.5 },
      { id: 'secretaries', name: 'Secretaries & Admin Assistants', baseScore: 7.5 },
      { id: 'travel-agents', name: 'Travel Agents', baseScore: 7.5 },
      { id: 'bookkeeping', name: 'Bookkeeping / Payroll Clerks', baseScore: 7.5 },
      { id: 'cashiers', name: 'Cashiers', baseScore: 7 },
      { id: 'other', name: 'Other (Low Risk)', baseScore: 4 }
    ];

    const SENIORITY_LEVELS = [
      { id: 'junior', label: 'JUNIOR', range: '0-2 yrs', slevel: 0, experienceId: 'years-0-2' },
      { id: 'mid', label: 'MID', range: '3-5 yrs', slevel: 1, experienceId: 'years-3-5' },
      { id: 'senior', label: 'SENIOR', range: '6-9 yrs', slevel: 2, experienceId: 'years-6-9' },
      { id: 'architect', label: 'ARCHITECT', range: '10+ yrs', slevel: 3, experienceId: 'years-10-plus' }
    ];

    const RISK_BANDS = [
      { key: 'low', label: 'LOW RISK', min: 0, max: 2.5, needlePercent: 10, colorVar: '--neon-green' },
      { key: 'watch', label: 'WATCHLIST', min: 2.5, max: 4.5, needlePercent: 30, colorVar: '--neon-cyan' },
      { key: 'exposed', label: 'EXPOSED', min: 4.5, max: 6.5, needlePercent: 50, colorVar: '--neon-yellow' },
      { key: 'critical', label: 'CRITICAL', min: 6.5, max: 8.5, needlePercent: 72, colorVar: '--neon-pink' },
      { key: 'doomed', label: 'DOOMED', min: 8.5, max: 10.01, needlePercent: 92, colorVar: '--neon-pink' }
    ];

    const ROAST_OPENERS = {
      'medical-transcriptionists': 'Your headset already sounds like a museum exhibit.',
      'software-developers': 'Your backlog now has a silicon staff engineer with no sleep cycle.',
      'data-scientists': 'Your dashboards just discovered they can explain themselves.',
      'financial-analysts': 'Your spreadsheet model now pitches itself to the board.',
      'graphic-designers': 'Your moodboard just unionized under a prompt box.',
      'financial-clerks': 'Your reconciliation ritual has been converted into autocomplete.',
      'general-office-clerks': 'Your inbox chores are getting packaged as a platform feature.',
      'accountants-auditors': 'Your variance check is being rebranded as instant compliance.',
      'lawyers': 'Your billable hours just met a parser with no conscience.',
      'paralegals': 'Your document prep is being eaten one precedent at a time.',
      'systems-analysts': 'Your requirements workshop now speaks fluent machine certainty.',
      'support-specialists': 'Your ticket queue just learned to close itself politely.',
      'financial-managers': 'Your forecasting deck has started cutting you out of the meeting.',
      'hr-specialists': 'Your interview rubric now arrives with its own synthetic recruiter.',
      'medical-records': 'Your coding workflow is halfway to being a background daemon.',
      'customer-service': 'Your empathy script just got productized by the minute.',
      'secretaries': "Your calendar diplomacy is now a checkbox in someone else's SaaS.",
      'travel-agents': 'Your itinerary magic is being flattened into one confident chatbot.',
      'bookkeeping': 'Your payroll ritual is turning into an overnight cron job.',
      'cashiers': 'Your lane just got challenged by a camera and a sensor grid.',
      'other': 'Congratulations, you found the one job title the robots need a minute to Google.'
    };

    const ROAST_MIDDLES = {
      low: 'For now the machines only have you bookmarked, not scheduled.',
      watch: 'The replacement memo is drafted, it is just waiting for budget approval.',
      exposed: 'You are no longer future-proof, merely future-adjacent.',
      critical: 'The automation pilot already has your chair in its rollout plan.',
      doomed: 'At this point the AI is basically asking where you keep the passwords.'
    };

    const ROAST_CLOSERS = {
      junior: 'Good news: you still have time to pivot before your LinkedIn headline fossilizes.',
      mid: 'You spent years getting efficient just in time for efficiency to become the threat.',
      senior: 'All that experience mostly means you will recognize the layoff language faster.',
      architect: 'You climbed high enough to get a panoramic view of your own disruption.'
    };

    // ===== ENGINE =====

    function getOccupationById(occupationId) {
      for (var i = 0; i < OCCUPATIONS.length; i++) {
        if (OCCUPATIONS[i].id === occupationId) return OCCUPATIONS[i];
      }
      return null;
    }

    function getSeniorityByExperienceId(experienceId) {
      for (var i = 0; i < SENIORITY_LEVELS.length; i++) {
        if (SENIORITY_LEVELS[i].experienceId === experienceId) return SENIORITY_LEVELS[i];
      }
      return null;
    }

    function calculateAdjustedScore(baseScore, slevel) {
      return Math.max(0, Math.min(10, baseScore - (slevel * 1.5)));
    }

    function calculateShelfLifeYears(adjustedScore) {
      return Math.max(0, Math.min(12, (10 - adjustedScore) * 1.2));
    }

    function splitShelfLife(shelfLifeYears) {
      var totalDays = Math.round(shelfLifeYears * 365);
      var years = Math.floor(totalDays / 365);
      var months = Math.floor((totalDays % 365) / 30);
      var days = (totalDays % 365) % 30;
      return { years: years, months: months, days: days, totalDays: totalDays };
    }

    function getRiskBand(adjustedScore) {
      for (var i = 0; i < RISK_BANDS.length; i++) {
        var band = RISK_BANDS[i];
        if (adjustedScore >= band.min && adjustedScore < band.max) {
          var needleAngle = -90 + (band.needlePercent * 1.8);
          return {
            key: band.key,
            label: band.label,
            needlePercent: band.needlePercent,
            needleAngle: needleAngle,
            colorVar: band.colorVar
          };
        }
      }
      return null;
    }

    function buildRoast(occupation, seniority, riskBand) {
      if (!occupation || !seniority || !riskBand) return '';
      return [ROAST_OPENERS[occupation.id], ROAST_MIDDLES[riskBand.key], ROAST_CLOSERS[seniority.id]].join(' ');
    }

    function buildResultModel(occupationId, experienceId) {
      var occupation = getOccupationById(occupationId);
      var seniority = getSeniorityByExperienceId(experienceId);
      if (!occupation || !seniority) return null;
      var adjustedScore = calculateAdjustedScore(occupation.baseScore, seniority.slevel);
      var shelfLifeYears = calculateShelfLifeYears(adjustedScore);
      var countdown = splitShelfLife(shelfLifeYears);
      var risk = getRiskBand(adjustedScore);
      var roast = buildRoast(occupation, seniority, risk);
      return {
        occupation: occupation,
        seniority: seniority,
        adjustedScore: adjustedScore,
        shelfLifeYears: shelfLifeYears,
        countdown: countdown,
        risk: risk,
        roast: roast
      };
    }

    function buildResultMatrix() {
      var results = [];
      OCCUPATIONS.forEach(function(occupation) {
        SENIORITY_LEVELS.forEach(function(seniority) {
          results.push(buildResultModel(occupation.id, seniority.experienceId));
        });
      });
      return results;
    }

    // ===== I18N =====

    const STRINGS = { en: {}, ptbr: {} };

    // ===== UI =====

    let selectedOccupation = null;
    let selectedExperience = null;
    let lastResult = null;

    function renderCards() {
      const grid = document.getElementById('card-grid');
      OCCUPATIONS.forEach(function(occ) {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('data-id', occ.id);
        card.innerHTML =
          '<div class="card-name">' + occ.name + '</div>' +
          '<div class="card-risk">Risk: ' + occ.baseScore + '/10</div>';
        card.addEventListener('click', function() {
          selectCard(occ.id);
        });
        grid.appendChild(card);
      });
    }

    function renderExperienceSelector() {
      const selector = document.getElementById('experience-selector');
      SENIORITY_LEVELS.forEach(function(level) {
        const btn = document.createElement('button');
        btn.className = 'exp-btn';
        btn.setAttribute('data-id', level.id);
        btn.innerHTML =
          '<span>' + level.label + '</span>' +
          '<span class="exp-label">' + level.range + '</span>';
        btn.addEventListener('click', function() {
          selectExperience(level.id);
        });
        selector.appendChild(btn);
      });
    }

    function selectCard(id) {
      selectedOccupation = id;
      document.querySelectorAll('.card').forEach(function(c) {
        c.classList.remove('selected');
      });
      var target = document.querySelector('.card[data-id="' + id + '"]');
      if (target) target.classList.add('selected');
      updateCTA();
    }

    function selectExperience(experienceId) {
      selectedExperience = experienceId;
      document.querySelectorAll('.exp-btn').forEach(function(b) {
        b.classList.remove('selected');
      });
      var target = document.querySelector('.exp-btn[data-id="' + experienceId + '"]');
      if (target) target.classList.add('selected');
      updateCTA();
    }

    function updateCTA() {
      var btn = document.getElementById('cta-btn');
      if (selectedOccupation && selectedExperience) {
        btn.removeAttribute('disabled');
      } else {
        btn.setAttribute('disabled', 'disabled');
      }
    }

    function showResults(result) {
      lastResult = result;
      document.getElementById('input-view').style.display = 'none';
      document.getElementById('results-view').style.display = 'block';

      document.getElementById('result-job-name').textContent = result.occupation.name + ' // ' + result.seniority.label;
      document.getElementById('countdown-years').textContent = String(result.countdown.years);
      document.getElementById('countdown-months').textContent = String(result.countdown.months);
      document.getElementById('countdown-days').textContent = String(result.countdown.days);
      document.getElementById('risk-label').textContent = result.risk.label;
      document.getElementById('risk-label').style.color = 'var(' + result.risk.colorVar + ')';
      document.getElementById('risk-score').textContent = result.adjustedScore.toFixed(1) + ' / 10';
      document.getElementById('roast-message').textContent = result.roast;

      var panel = document.getElementById('results-panel');
      var needle = document.getElementById('gauge-needle');
      panel.classList.remove('results-visible');
      needle.style.transform = 'rotate(-90deg)';

      requestAnimationFrame(function() {
        panel.classList.add('results-visible');
        needle.style.transform = 'rotate(' + result.risk.needleAngle + 'deg)';
      });
    }

    function resetResultState() {
      lastResult = null;
      var panel = document.getElementById('results-panel');
      panel.classList.remove('results-visible');
      document.getElementById('result-job-name').textContent = '--';
      document.getElementById('countdown-years').textContent = '0';
      document.getElementById('countdown-months').textContent = '0';
      document.getElementById('countdown-days').textContent = '0';
      document.getElementById('risk-label').textContent = '--';
      document.getElementById('risk-label').style.color = 'var(--neon-cyan)';
      document.getElementById('risk-score').textContent = '0.0 / 10';
      document.getElementById('roast-message').textContent = '--';
      document.getElementById('gauge-needle').style.transform = 'rotate(-90deg)';
    }

    function showInput() {
      document.getElementById('results-view').style.display = 'none';
      document.getElementById('input-view').style.display = 'block';
    }

    // ===== SHARE =====

    // Share functionality — Phase 4

    // ===== BOOT =====

    function init() {
      renderCards();
      renderExperienceSelector();
      document.getElementById('cta-btn').addEventListener('click', function() {
        var result = buildResultModel(selectedOccupation, selectedExperience);
        if (result) {
          showResults(result);
        }
      });
      document.getElementById('try-again-btn').addEventListener('click', function() {
        resetResultState();
        showInput();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
